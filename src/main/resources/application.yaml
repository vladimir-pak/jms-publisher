server:
  port: 9000

spring:
  application:
    name: jms-publisher

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

app:
  artemis:
    # Optional full URL override. If set, app.artemis.hosts/settings below are ignored by URL builder.
    # broker-url: "(ssl://artemis-1:61617,ssl://artemis-2:61617)?ha=true;clientID=jms-publisher-1;initialConnectAttempts=3;reconnectAttempts=-1;retryInterval=2500;blockOnNonDurableSend=true;consumerWindowSize=0;sslEnabled=true;enabledCipherSuites=TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"

    # Multi-host URL will be built from this list:
    # (ssl://artemis-1:61617,ssl://artemis-2:61617)?ha=true;...
    scheme: ssl
    hosts:
      - host: artemis-1.example.local
        port: 61617
      - host: artemis-2.example.local
        port: 61617

    client-id: ${ARTEMIS_CLIENT_ID:jms-publisher-1}

    ha: true
    initial-connect-attempts: 3
    reconnect-attempts: -1
    retry-interval-ms: 2500
    block-on-non-durable-send: true
    consumer-window-size: 0

    headers:
      x-from: ${ARTEMIS_X_FROM:jms-publisher}
      x-service-id: ${ARTEMIS_X_SERVICE_ID:jms-load-test}

    ssl-enabled: true
    enabled-cipher-suites: ${ARTEMIS_ENABLED_CIPHER_SUITES:TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384}

    trust-store-path: /opt/app/certs/truststore.p12
    trust-store-password: ${TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

    # Mutual TLS, if required by broker:
    # key-store-path: /opt/app/certs/keystore.p12
    # key-store-password: ${KEYSTORE_PASSWORD}
    # key-store-type: PKCS12

    username: ${ARTEMIS_USERNAME}
    password: ${ARTEMIS_PASSWORD}

    request-queue: REQUEST.Q
    reply-queue: REPLY.Q

    receive-timeout-ms: 30000
    concurrent-senders: 20

    delivery-mode-persistent: true
    message-ttl-ms: 60000

    early-reply-ttl-ms: 60000
    early-reply-max-size: 10000

    ibm-mq-compatibility:
      # JMSReplyTo -> MQMD.ReplyToQ / ReplyToQMgr after bridge to IBM MQ.
      reply-to-enabled: true

      # Default and recommended for MQMD provider:
      # request JMSMessageID / MQMD.MsgId -> response JMSCorrelationID / MQMD.CorrelId.
      request-correlation-id-enabled: false
      request-correlation-id-prefix: "REQ-"

      # Enable only if your Artemis->IBM MQ bridge or IBM MQ JMS side expects these properties.
      ibm-properties-enabled: false
      mq-message-type: 1       # IBM MQ MQMT_REQUEST
      mq-format: MQSTR         # IBM MQ MQFMT_STRING
      character-set: 1208      # UTF-8
      encoding: 546
